<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(135deg, #5e8b7e 0%, #a7c4bc 100%);">

    <div class="form-container" style="max-width:400px;">
        <h2>Admin Login</h2>

        <form onsubmit="login(); return false;">
            <input type="text" class="login-input" id="user" placeholder="Username">
            <input type="password" class="login-input" id="pass" placeholder="Password">

            <br><br>

            <button type="submit">Login</button>

            <p id="error" class="error"></p>
        </form>
    </div>

    <script>

        function login() {

            if (
                document.getElementById("user").value === "admin"
                &&
                document.getElementById("pass").value === "4159"
            ) {
                localStorage.setItem("isAdmin", "true");
                window.location.href = "admin.html";
            }
            else {
                document.getElementById("error").innerText = "Invalid credentials";
            }

        }

    </script>
</body>

</html>
