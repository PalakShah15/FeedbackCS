<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="brand">Feedback Hub</div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <!--<span class="nav-separator">|</span>
         <a href="admin.html" class="nav-link">Admin Dashboard</a>-->
        </div>

        <div class="hamburger" onclick="openNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- ===== SIDE NAV ===== -->
    <div id="sideNav" class="sidenav">
        <span class="closebtn" onclick="closeNav()">&times;</span>

        <a href="index.html">🏠 Home</a>
        <!--<a href="admin.html">📊 Admin Dashboard</a>-->
        <a href="service.html">📋 Service Feedback</a>
        <a href="product.html">📦 Product Feedback</a>
        <a href="training.html">🎓 Training & Course Feedback</a>
        <a href="event.html">🎉 Event Feedback</a>
        <a href="website.html">🌐 Website Feedback</a>
    </div>

    <div id="themeToggle" class="theme-toggle">🌙</div>

    <div class="form-container">
        <h2>Training & Course Feedback</h2>

        <form data-type="Training" class="feedback-form">
            <label>Your Name</label>
            <input type="text" name="name" required placeholder="John Doe">
            <small class="error"></small>

            <label>Your Email</label>
            <input type="email" name="email" required placeholder="john@example.com">
            <small class="error"></small>

            <label>Course Name</label>
            <input type="text" name="courseName" required placeholder="e.g. Advanced JavaScript">
            <small class="error"></small>

            <label>Instructor Name</label>
            <input type="text" name="instructorName" required placeholder="e.g. Jane Smith">
            <small class="error"></small>

            <label>Difficulty Level</label>
            <select name="difficultyLevel" required>
                <option value="">Select</option>
                <option>Easy</option>
                <option>Medium</option>
                <option>Hard</option>
            </select>
            <small class="error"></small>

            <p class="section-label">Content Quality</p>
            <div class="option-group">
                <div class="option-row">
                    <input type="radio" id="content-excellent" name="contentQuality" value="Excellent" required>
                    <label for="content-excellent">Excellent</label>
                </div>
                <div class="option-row">
                    <input type="radio" id="content-good" name="contentQuality" value="Good">
                    <label for="content-good">Good</label>
                </div>
                <div class="option-row">
                    <input type="radio" id="content-average" name="contentQuality" value="Average">
                    <label for="content-average">Average</label>
                </div>
            </div>
            <small class="error"></small>

            <label>Overall Rating</label>
            <div class="stars" data-rating="0"></div>
            <small class="error"></small>

            <label>Feedback & Suggestions</label>
            <textarea name="feedback" required></textarea>
            <small class="error"></small>

            <button type="submit">Submit Feedback</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
