<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="brand">Feedback Hub</div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <!--<span class="nav-separator">|</span>
         <a href="admin.html" class="nav-link">Admin Dashboard</a>-->
        </div>

        <div class="hamburger" onclick="openNav()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- ===== SIDE NAV ===== -->
    <div id="sideNav" class="sidenav">
        <span class="closebtn" onclick="closeNav()">&times;</span>

        <a href="index.html">🏠 Home</a>
        <!--<a href="admin.html">📊 Admin Dashboard</a>-->
        <a href="service.html">📋 Service Feedback</a>
        <a href="product.html">📦 Product Feedback</a>
        <a href="training.html">🎓 Training & Course Feedback</a>
        <a href="event.html">🎉 Event Feedback</a>
        <a href="website.html">🌐 Website Feedback</a>
    </div>

    <div id="themeToggle" class="theme-toggle">🌙</div>

    <div class="form-container">
        <h2>Service Feedback Form</h2>

        <form data-type="Service" class="feedback-form">
            <label>Your Name</label>
            <input type="text" name="name" required placeholder="John Doe">
            <small class="error"></small>

            <label>Your Email</label>
            <input type="email" name="email" required placeholder="john@example.com">
            <small class="error"></small>

            <label>Service Type</label>
            <select name="serviceType" required>
                <option value="">Select</option>
                <option>Customer Support</option>
                <option>Delivery</option>
                <option>After Sales</option>
            </select>
            <small class="error"></small>

            <p class="section-label">Staff Behaviour</p>
            <div class="option-group">
                <div class="option-row">
                    <input type="radio" id="staff-good" name="staffBehaviour" value="Good" required>
                    <label for="staff-good">Good</label>
                </div>
                <div class="option-row">
                    <input type="radio" id="staff-average" name="staffBehaviour" value="Average">
                    <label for="staff-average">Average</label>
                </div>
                <div class="option-row">
                    <input type="radio" id="staff-poor" name="staffBehaviour" value="Poor">
                    <label for="staff-poor">Poor</label>
                </div>
            </div>
            <small class="error"></small>

            <label>Overall Rating</label>
            <div class="stars" data-rating="0"></div>
            <small class="error"></small>

            <label>Suggestions</label>
            <textarea name="suggestions" required></textarea>
            <small class="error"></small>

            <button type="submit">Submit Feedback</button>
        </form>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p style="font-size: 15px;">© 2026 FEEDBACK HUB | Feedback Collection System</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
